<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Classes</title>
</head>
<link rel="stylesheet" href="styles.css">
<body>
    <h1>Demonstração de Pseudo-Classes</h1>
    <hr>
    <h2>:Hover - É ativada quando o mouse passa sobre o elemento</h2>
    <div class="caixa">
        Passe o mouse aqui
    </div>
    <br>
    <button class="btn-download">Download</button>
    <br>

    <h2>:focus - Clique nos campos</h2>
    <form>
        <input type="text" placeholder="Clique aqui para focar">
        <input type="password" placeholder="Outro campo com focus">
</form>

    
</body>
</html>
